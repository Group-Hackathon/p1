name: iOS Build

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'iosp1/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'iosp1/**'
      - '.github/workflows/ios.yml'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Build iOS App
        run: |
          cd iosp1/P1
          xcodebuild clean build \
            -project P1.xcodeproj \
            -scheme P1 \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro,OS=latest" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/Intermediates.noindex/**/*.log
