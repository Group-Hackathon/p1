version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://patient:secure_password@db:5432/living_patient_memory?sslmode=disable
      - JWT_SECRET=dev-secret-change-in-production
      - PORT=8080
      - GCP_PROJECT_ID=living-patient-memory
      - GCP_LOCATION=us-central1
      - GEMINI_MODEL=gemini-3.5-flash
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=patient
      - POSTGRES_PASSWORD=secure_password
      - POSTGRES_DB=living_patient_memory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patient -d living_patient_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
