<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>LPM - Journey Reversed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="journey-v2.css" />
</head>
<body>

  <!-- Phone Frame -->
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="phone-screen">

      <!-- Header -->
      <div class="app-header">
        <button class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="header-title">Tracking</h1>
        <button class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
      </div>

      <!-- STICKY TOP: The Goal (Connected to the timeline) -->
      <div class="sticky-top">
        <div class="appointment-card">
          <div class="appt-info">
            <div class="appt-label">FINAL APPOINTMENT</div>
            <div class="appt-date">Jun 20, 2026</div>
            <div class="appt-doc">Dr. Martinez • 2 days left</div>
          </div>
          
          <button class="pdf-btn" id="pdfBtn" onclick="openPdfPreview()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            <div class="pdf-lock" id="pdfLock">
              <svg viewBox="0 0 24 24" fill="currentColor" width="10" height="10">
                <path d="M19 11h-1.4V8.8A5.6 5.6 0 0 0 12 3.2a5.6 5.6 0 0 0-5.6 5.6V11H5c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-8c0-1.1-.9-2-2-2zm-7 7c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-7H8.9V8.8c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1V11z"/>
              </svg>
            </div>
          </button>
        </div>
        
        <div class="progress-container">
          <div class="progress-track">
            <div class="progress-fill" style="width: 62.5%"></div>
          </div>
          <div class="progress-text">5 / 8</div>
        </div>
        
        <!-- This line connects the sticky top to the scrolling timeline below -->
        <div class="top-connector-line"></div>
      </div>

      <!-- TIMELINE: Reversed Order -->
      <div class="timeline-container" id="timelineContainer">
        <!-- JS will inject timeline items here (Day 8 down to Day 1) -->
      </div>

    </div>

    <!-- PDF Modal -->
    <div class="modal-overlay" id="pdfModal">
      <div class="modal-sheet">
        <div class="modal-header">
          <h2 class="modal-title">Report Preview</h2>
          <button class="btn-icon" onclick="closePdfPreview()" style="width:32px;height:32px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-content">
          <div class="info-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <p>This is a preview. The final PDF will be unlocked once you complete all 8 days.</p>
          </div>
          <h3 class="chart-title">Temperature Trend</h3>
          <canvas id="previewChart" width="300" height="120"></canvas>
          <button class="btn-primary" style="margin-top:20px;" onclick="closePdfPreview()">Got it</button>
        </div>
      </div>
    </div>

  </div>

  <script src="journey-v2.js"></script>
</body>
</html>
